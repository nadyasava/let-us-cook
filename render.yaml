services:
  - type: web
    name: letuscook
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "gunicorn --chdir backend --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.3
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VISION_MODEL
        value: claude-sonnet-4-6
